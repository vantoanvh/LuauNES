<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File to RBXMX</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #0d0d0d;
      --surface: #121212;
      --surface-hover: #181818;
      --text: #f2f2f2;
      --muted: #8a8a8a;
      --border: #242424;
      --border-strong: #343434;
      --accent: #5a5a5a;
      --accent-hover: #6a6a6a;
      --focus: #3a3a3a;
      --shadow: #000000;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 16px;
      color-scheme: dark;
    }

    .card {
      width: min(780px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 18px 42px 0 var(--shadow);
    }

    .title {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 4px 0 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    input[type="file"] {
      max-width: 100%;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      background: var(--surface);
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      padding: 7px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--border-strong);
      color: var(--text);
    }

    button:hover {
      border-color: var(--border-strong);
      background: var(--surface-hover);
    }

    button.primary:hover {
      border-color: #4a4a4a;
      background: var(--accent-hover);
    }

    textarea {
      width: 100%;
      min-height: 280px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font: 13px/1.45 Consolas, "Courier New", monospace;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    input[type="file"]:focus-visible,
    button:focus-visible,
    textarea:focus-visible {
      border-color: var(--border-strong);
      box-shadow: 0 0 0 3px var(--focus);
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="title">File to RBXMX</h1>
    <p class="subtitle">Upload, edit source, and export.</p>

    <div class="row">
      <input id="fileInput" type="file" />
      <button id="copyBtn" type="button">Copy</button>
      <button id="exportBtn" class="primary" type="button">Export .rbxmx</button>
    </div>

    <textarea id="clipboardBox" spellcheck="false" placeholder="--// name.extension&#10;&#10;return &quot;\0\12\42\255\23&quot;"></textarea>
    <p class="hint">Upload a file to generate editable text. Every byte is written as a numeric Lua escape.</p>
  </main>

  <script>
    const fileInput = document.getElementById("fileInput");
    const clipboardBox = document.getElementById("clipboardBox");
    const copyBtn = document.getElementById("copyBtn");
    const exportBtn = document.getElementById("exportBtn");
    const MAX_FILE_BYTES = 10 * 1024 * 1024;

    function bytesToLuaEscapedString(bytes) {
      let result = "";
      for (const b of bytes) {
        result += "\\" + String(b);
      }
      return result;
    }

    function toClipboardText(fileName, bytes) {
      const escaped = bytesToLuaEscapedString(bytes);
      return `--// ${fileName}\n\nreturn "${escaped}"`;
    }

    function cdataSafe(text) {
      return text.replaceAll("]]>", "]]]]><![CDATA[>");
    }

    function buildRbxmx(sourceText) {
      const safeSource = cdataSafe(sourceText);
      return `<roblox xmlns:xmime="http://www.w3.org/2005/05/xmlmime" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:noNamespaceSchemaLocation="http://www.roblox.com/roblox.xsd" version="4">\n\t<Item class="ModuleScript">\n\t\t<Properties>\n\t\t\t<Content name="LinkedSource"><null></null></Content>\n\t\t\t<ProtectedString name="Source"><![CDATA[${safeSource}]]></ProtectedString>\n\t\t\t<string name="Name">ModuleScript</string>\n\t\t</Properties>\n\t</Item>\n</roblox>`;
    }

    function downloadTextFile(fileName, content) {
      const blob = new Blob([content], { type: "application/xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      if (file.size > MAX_FILE_BYTES) {
        alert("Max file size is 10 MB.");
        fileInput.value = "";
        return;
      }

      const buffer = await file.arrayBuffer();
      const bytes = new Uint8Array(buffer);
      clipboardBox.value = toClipboardText(file.name, bytes);
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(clipboardBox.value);
        copyBtn.textContent = "Copied";
        setTimeout(() => {
          copyBtn.textContent = "Copy";
        }, 1200);
      } catch {
        copyBtn.textContent = "Copy failed";
        setTimeout(() => {
          copyBtn.textContent = "Copy";
        }, 1200);
      }
    });

    exportBtn.addEventListener("click", () => {
      const source = clipboardBox.value ?? "";
      const xml = buildRbxmx(source);
      downloadTextFile("module.rbxmx", xml);
    });
  </script>
</body>
</html>
